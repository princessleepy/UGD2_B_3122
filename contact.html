<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Contact - Mrs Ale</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <div class="page-wrapper">
    <!-- Background -->
    <div class="bg-split">
        <div class="bg-kiri"></div>
        <div class="bg-kanan"></div>
        <div class="bg-tengah"></div>
    </div>
    
<!--HEADER-->
    <header class="main header">
        <div class="logo-kiri">
            <a href="index.html">
                <img src="home.png" alt="Home">
            </a>
        </div>

        <!--navigasi-->
        <nav class ="nav-kanan">
            <a href="about.html">About Me</a>
            <a href="skills.html">Skill</a>
            <a href="porto.html">Portofolio</a>
            <a href="contact.html" class="btn-c">Contact Me</a> 
        </nav>
    </header>

    <section class="contact-section">
    <div class="contact-kiri">
        <h1>Contact Me</h1>
        <p>
            Silakan isi form di sebelah kanan untuk menghubungi saya.
            Saya akan membalas pesan Anda secepat mungkin.
        </p>
    </div>

    <div class="contact-kanan">
        <h1>SEND MESSAGE</h1>

        <form>
            <div class="form-group">
                <input type="text" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <input type="text" placeholder="Phone number">
            </div>

            <div class="form-group">
                <textarea placeholder="Your message*" required></textarea>
            </div>

            <button type="submit" class="btn-submit">SUBMIT</button>
        </form>
    </div>

</section>

</body>
</html>
